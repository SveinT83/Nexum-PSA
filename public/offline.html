<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexum PSA is offline</title>
    <style>
        :root {
            color-scheme: light dark;
            --brand: #ff6d1f;
            --ink: #212529;
            --muted: #6c757d;
            --surface: #ffffff;
            --page: #f4f5f7;
            --line: #dee2e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --ink: #f8fafc;
                --muted: #adb5bd;
                --surface: #111827;
                --page: #0f172a;
                --line: #374151;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: var(--page);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 34rem);
            padding: 1.5rem;
            border: 1px solid var(--line);
            border-radius: .5rem;
            background: var(--surface);
        }

        .mark {
            width: 2.75rem;
            height: 2.75rem;
            display: inline-grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: .5rem;
            color: var(--brand);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        h1 {
            margin: 0 0 .5rem;
            font-size: 1.35rem;
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        button {
            margin-top: 1.25rem;
            border: 1px solid var(--brand);
            border-radius: .375rem;
            background: var(--brand);
            color: #ffffff;
            font: inherit;
            font-weight: 600;
            padding: .6rem .9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<main>
    <div class="mark" aria-hidden="true">N</div>
    <h1>Nexum PSA is offline</h1>
    <p>The app could not reach the server. Reconnect and try again to continue with live tickets, tasks, calendar, and portal data.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
</main>
</body>
</html>
